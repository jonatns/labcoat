name: Prepare CLI release PR

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-pr-main
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Validate release metadata
        run: node scripts/release/validate-release.mjs
      - name: Refresh release input digest
        run: node scripts/release/update-release-trigger.mjs
      - name: Prepare or update release PR
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: release-pr
          config: release-plz.toml
