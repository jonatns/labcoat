name: Build legacy Isomer desktop

on:
  workflow_dispatch:
    inputs:
      publish_draft:
        description: Upload bundles to a draft GitHub release
        type: boolean
        default: false
        required: true
      tag:
        description: Legacy release tag (required when publishing)
        type: string
        default: isomer-v0.1.1
        required: true
      build_extension:
        description: Also attempt the standalone browser-extension build
        type: boolean
        default: false
        required: true

concurrency:
  group: legacy-desktop
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            args: --target aarch64-apple-darwin
          - runner: macos-latest
            args: --target x86_64-apple-darwin
          - runner: ubuntu-22.04
            args: ""
          - runner: windows-latest
            args: ""
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.86.0
          targets: ${{ startsWith(matrix.runner, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - run: pnpm install --frozen-lockfile
      - name: Build without publishing
        if: inputs.publish_draft != true
        run: pnpm --filter @isomer/desktop tauri build ${{ matrix.args }}
      - name: Build and upload draft
        if: inputs.publish_draft == true
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: apps/isomer
          tagName: ${{ inputs.tag }}
          releaseName: Isomer ${{ inputs.tag }}
          releaseBody: Maintenance-mode desktop build.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  extension:
    if: inputs.build_extension == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - working-directory: apps/isomer-extension
        run: pnpm --ignore-workspace install --no-frozen-lockfile && pnpm --ignore-workspace build
      - run: cd apps/isomer-extension && zip -r isomer-extension.zip dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: isomer-extension
          path: apps/isomer-extension/isomer-extension.zip
