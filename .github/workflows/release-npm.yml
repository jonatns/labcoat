name: Release (npm packages)

# Changesets-driven npm releases for @jonatns/labcoat and create-labcoat.
# On pushes to main with pending changesets, opens/updates a "Version
# Packages" PR; merging that PR publishes to npm. Requires the NPM_TOKEN
# repository secret.
on:
  push:
    branches: [main]

concurrency: release-npm-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
