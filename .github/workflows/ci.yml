name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      js: ${{ steps.filter.outputs.js }}
      extension: ${{ steps.filter.outputs.extension }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'apps/isomer/src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
            js:
              - 'packages/**'
              - 'apps/isomer/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'package.json'
            extension:
              - 'apps/isomer-extension/**'

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps (webkit2gtk for Tauri, protoc for prost)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked
      - run: cargo test --workspace --locked
      - run: cargo clippy --workspace --locked -- -D warnings

  js:
    needs: changes
    if: needs.changes.outputs.js == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Unit tests (labcoat)
        run: pnpm --filter @jonatns/labcoat exec jest
        # Two pre-existing array-ABI failures are tracked for the Phase 3
        # compiler port (see TOOLCHAIN.md baseline notes); drop this once fixed.
        continue-on-error: true

  extension:
    needs: changes
    if: needs.changes.outputs.extension == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/isomer-extension
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Standalone on purpose: not a pnpm workspace member (its
      # @alkanes/ts-sdk dep is a raw tarball URL on pkg.alkanes.build).
      - run: pnpm install
      - run: pnpm build

  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: "Guard: oyl-sdk is banned from the npm tree (direct or transitive)"
        # TEMPORARY EXCEPTION until Phase 3 of the migration: the one known,
        # tracked direct dep in packages/labcoat (docs/migration/OYL-AUDIT.md)
        # is tolerated; anything else containing oyl-sdk fails. Phase 3
        # deletes the dep and the KNOWN filter below.
        run: |
          pnpm install --frozen-lockfile
          KNOWN='packages/labcoat'
          HITS=$(pnpm ls -r --depth Infinity --parseable 2>/dev/null | grep -iE 'oyl[/+-]sdk' || true)
          NEW=$(echo "$HITS" | grep -v "$KNOWN" | grep . || true)
          if [ -n "$NEW" ]; then
            echo "$NEW"
            echo '::error::@oyl/sdk found outside the tracked Phase-3 removal ledger (banned — see TOOLCHAIN.md)'
            exit 1
          fi
          if [ -n "$HITS" ]; then
            echo '::warning::@oyl/sdk still present via packages/labcoat — scheduled for removal in Phase 3'
          fi
      - name: "Guard: oyl-sdk is banned from the cargo tree"
        run: |
          if grep -riE 'oyl[_/-]?sdk|"oyl"|/oyl[-.]' Cargo.lock; then
            echo '::error::oyl reference found in Cargo.lock (banned — see TOOLCHAIN.md)'
            exit 1
          fi
      - name: "Guard: every alkanes-rs reference is pinned to the TOOLCHAIN.md rev on develop"
        run: |
          PIN=$(grep -oE '\*\*Pinned commit\*\* \| `[0-9a-f]{40}`' TOOLCHAIN.md | grep -oE '[0-9a-f]{40}')
          echo "Pinned rev: $PIN"
          test -n "$PIN" || { echo '::error::could not read pin from TOOLCHAIN.md'; exit 1; }
          # 1) No unpinned/branch refs to alkanes-rs anywhere in the tree
          #    (Cargo git deps must use rev=, workflows must use the SHA).
          BAD=$(grep -rn --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.ts' 'alkanes-rs' \
                 | grep -vE "$PIN" \
                 | grep -viE 'toolchain\.md|docs/|branch of record' \
                 | grep -iE 'branch *= *"|ref: *(main|develop)$|alkanes-rs(\.git)?" *\}' || true)
          if [ -n "$BAD" ]; then
            echo "$BAD"
            echo '::error::alkanes-rs referenced without the pinned rev (see TOOLCHAIN.md)'
            exit 1
          fi
          # 2) The pin itself must be reachable from develop (and not from main)
          git clone --bare --filter=blob:none https://github.com/kungfuflex/alkanes-rs /tmp/alkanes-rs-check
          cd /tmp/alkanes-rs-check
          git merge-base --is-ancestor "$PIN" refs/heads/develop \
            || { echo '::error::pinned rev is not reachable from alkanes-rs develop'; exit 1; }
          if git merge-base --is-ancestor "$PIN" refs/heads/main; then
            echo '::warning::pinned rev is also on main — verify it was pinned from develop'
          fi
